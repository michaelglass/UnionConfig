name: Deploy Docs

on:
  push:
    tags:
      - 'v*'
      - '!v*-alpha*'
      - '!v*-beta*'
      - '!v*-rc*'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    uses: michaelglass/MichaelsWackyFsPackageTools/.github/workflows/michaels-wacky-docs.yml@main
    with:
      fsdocs-parameters: '--parameters root /UnionConfig/'
    permissions:
      contents: read
      pages: write
      id-token: write
