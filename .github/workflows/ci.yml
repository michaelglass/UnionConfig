name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  checks: write
  pull-requests: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Restore tools
        run: dotnet tool restore

      - name: Check formatting
        run: dotnet fantomas src/ tests/ --check

      - name: Build
        run: dotnet build --no-restore

      - name: Lint
        run: dotnet fsharplint lint UnionConfig.slnx

      - name: Test
        run: dotnet exec tests/UnionConfig.Tests/bin/Debug/net10.0/UnionConfig.Tests.dll

  pack:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Pack
        run: |
          dotnet pack src/UnionConfig/UnionConfig.fsproj -c Release -o ./artifacts
          dotnet pack src/UnionConfig.TextEditor/UnionConfig.TextEditor.fsproj -c Release -o ./artifacts

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack src/UnionConfig/UnionConfig.fsproj -c Release --no-build -o ./artifacts
          dotnet pack src/UnionConfig.TextEditor/UnionConfig.TextEditor.fsproj -c Release --no-build -o ./artifacts

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

      - name: Login to NuGet (Trusted Publishing)
        id: nuget-login
        uses: nuget/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
