name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    uses: michaelglass/MichaelsWackyFsPackageTools/.github/workflows/michaels-wacky-build.yml@main
    with:
      solution: UnionConfig.slnx
      fantomas-paths: 'src/ tests/ examples/'
      has-examples: true
      example-path: 'examples/ExampleApp'
